<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoutPro — Fede Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --bg: #060F1C; --panel: #0A1628; --card: #0D1E35; --card2: #102340;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --cyan: #00D4FF; --gold: #F5A623; --green: #00E676; --red: #FF4444;
  --blue: #1B4FD8; --blue2: #3B6EF0; --blue3: rgba(59,110,240,0.14);
  --w100: #FFF; --w70: rgba(255,255,255,0.70); --w50: rgba(255,255,255,0.50);
  --w30: rgba(255,255,255,0.30); --w15: rgba(255,255,255,0.15);
  --w08: rgba(255,255,255,0.08); --w04: rgba(255,255,255,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--w100); font-family: 'Inter', sans-serif; font-size: 13px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; }

.topbar { height: 52px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
.brand { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 800; }
.brand-ico { width: 28px; height: 28px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; color: white; }

.upload-banner { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 150; background: var(--bg); }
.upload-box { border: 2px dashed var(--border2); border-radius: 16px; padding: 60px 40px; text-align: center; max-width: 480px; cursor: pointer; }
.upload-box.drag { border-color: var(--cyan); background: rgba(0,212,255,0.10); }
.upload-icon { font-size: 52px; margin-bottom: 16px; }
.upload-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.upload-btn { background: var(--blue); color: white; border: none; padding: 11px 28px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
.upload-btn:hover { background: var(--blue2); }

.shell { display: flex; height: 100vh; padding-top: 52px; }
.sidebar { width: 180px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 10px 0; }
.sec-title { padding: 10px 12px 5px; font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--w30); }
.liga-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; font-size: 11px; color: var(--w70); border-left: 3px solid transparent; }
.liga-item:hover { background: var(--w08); }
.liga-item.active { background: var(--blue3); color: var(--cyan); border-left-color: var(--cyan); font-weight: 600; }
.liga-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; }
.liga-count { margin-left: auto; font-size: 9px; color: var(--w30); background: var(--w08); padding: 1px 5px; border-radius: 10px; }

.players-panel { width: 260px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.players-header { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.players-title { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
.search-box input { width: 100%; background: var(--w08); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px 6px 26px; color: var(--w100); font-size: 11px; outline: none; }
.search-box input:focus { border-color: var(--blue2); }
.filters { display: flex; gap: 4px; padding: 6px 12px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-btn { padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); color: var(--w50); }
.filter-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
.players-list { flex: 1; overflow-y: auto; }
.player-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid var(--border); }
.player-row:hover { background: var(--w04); }
.player-row.selected { background: var(--blue3); border-left: 3px solid var(--cyan); }
.player-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; background: var(--blue); color: white; overflow: hidden; }
.player-avatar img { width: 100%; height: 100%; object-fit: cover; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-weight: 600; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-sub { font-size: 9px; color: var(--w50); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-score { font-family: monospace; font-size: 10px; font-weight: 700; min-width: 32px; text-align: right; }

.main-area { flex: 1; background: var(--bg); overflow-y: auto; padding: 16px; }
.main-content { max-width: 1200px; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.card-header { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.hero { text-align: center; margin-bottom: 10px; }
.hero-avatar { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 8px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 900; color: white; overflow: hidden; }
.hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
.hero-name { font-size: 16px; font-weight: 800; margin: 6px 0 3px; }
.hero-pos { font-size: 11px; color: var(--cyan); font-weight: 700; }
.hero-club { font-size: 11px; color: var(--w50); display: flex; align-items: center; gap: 4px; justify-content: center; }
.hero-club img { width: 18px; height: 18px; border-radius: 2px; object-fit: cover; }

.info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 11px; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--w50); }
.info-value { font-weight: 600; }
.info-value.cyan { color: var(--cyan); }

.toast { position: fixed; bottom: 16px; left: 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 11px; z-index: 999; }
.toast.ok { border-color: var(--green); background: rgba(0,230,118,0.1); }
.toast.err { border-color: var(--red); background: rgba(255,68,68,0.1); }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-ico">SP</div>
    <div>Scout<span style="color:var(--cyan)">Pro</span></div>
  </div>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls" onchange="loadFile(this)" style="display:none;">

<div class="upload-banner" id="banner">
  <div class="upload-box" ondrop="drop(event)" ondragover="dragover(event)" ondragleave="dragleave(event)" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📊</div>
    <div class="upload-title">Subí tu Excel</div>
    <div style="font-size:12px;color:var(--w50);margin:12px 0;">Cargá el archivo de rendimientos</div>
    <button class="upload-btn">Seleccionar archivo</button>
  </div>
</div>

<div class="shell" id="app" style="display:none;">
  <div class="sidebar" id="sidebar"></div>
  <div class="players-panel">
    <div class="players-header">
      <div class="players-title">👥 Jugadores</div>
      <div class="search-box" style="position:relative;">
        <input type="text" id="search" placeholder="Filtrar..." onkeyup="showPlayers()">
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('Todos',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('RENDIDOR',this)">✅</button>
      <button class="filter-btn" onclick="setFilter('ESTANCO',this)">📊</button>
      <button class="filter-btn" onclick="setFilter('BAJO',this)">⚠️</button>
    </div>
    <div class="players-list" id="list"></div>
  </div>

  <div class="main-area">
    <div class="main-content" id="content"></div>
  </div>
</div>

<script>
const DB = { ligas:{}, equipos:{}, liga:null, player:null, filter:'Todos' };

function log(msg) { console.log('[ScoutPro]', msg); }
function toast(msg, type='ok') { 
  const el = document.createElement('div'); 
  el.className = 'toast ' + type; 
  el.textContent = msg; 
  document.body.appendChild(el); 
  setTimeout(() => el.remove(), 2500); 
}

function drop(e) { e.preventDefault(); dragleave(e); if(e.dataTransfer.files[0]) loadFile({files:e.dataTransfer.files}); }
function dragover(e) { e.preventDefault(); e.target.classList.add('drag'); }
function dragleave(e) { e.target.classList.remove('drag'); }
function loadFile(inp) { if(inp.files[0]) readFile(inp.files[0]); }

function readFile(file) {
  toast('Leyendo ' + file.name);
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      DB.ligas = {};
      DB.equipos = {};
      
      wb.SheetNames.forEach(nombre => {
        const ws = wb.Sheets[nombre];
        const rows = XLSX.utils.sheet_to_json(ws, {defval:null});
        
        if(rows.length > 0) {
          if(nombre.toLowerCase().includes('equipo')) {
            log('Equipos: ' + rows.length);
            rows.forEach(row => {
              const eq = getCol(row, ['equipo','Equipo','EQUIPO','nombre','Nombre','club','Club']) || '';
              const logo = getCol(row, ['logo','Logo','LOGO','escudo','Escudo','url','URL']) || '';
              if(eq) DB.equipos[eq.toString().trim()] = logo.toString().trim();
            });
          } else {
            DB.ligas[nombre] = parse(rows, nombre);
          }
        }
      });
      
      log('Cargado. Ligas: ' + Object.keys(DB.ligas).length + ', Equipos: ' + Object.keys(DB.equipos).length);
      init();
      toast('Archivo cargado ✅', 'ok');
    } catch(err) {
      log('Error: ' + err);
      toast('Error: ' + err.message, 'err');
    }
  };
  reader.readAsBinaryString(file);
}

function getCol(row, keys) {
  for(const k of keys) if(row[k]) return row[k];
  for(const rk of Object.keys(row)) for(const k of keys) if(rk.toLowerCase() === k.toLowerCase()) return row[rk];
  return null;
}

function parse(rows, liga) {
  return rows.map((row, i) => {
    const nombre = getCol(row, ['nombre','Nombre','NOMBRE','jugador','Jugador','player']) || 'J'+i;
    const pos = getCol(row, ['posicion','Posición','pos','POS','position']) || '';
    const club = getCol(row, ['club','Club','CLUB','equipo','Equipo']) || '';
    const edad = getCol(row, ['edad','Edad','EDAD','age']) || '';
    const alt = getCol(row, ['altura','Altura','ALTURA','height']) || '';
    const pie = getCol(row, ['pie','Pie','PIE']) || '';
    const nac = getCol(row, ['nacionalidad','Nacionalidad','pais']) || '';
    const valor = getCol(row, ['valor','Valor','value']) || '';
    const contrato = getCol(row, ['contrato','Contrato']) || '';
    const rep = getCol(row, ['representante','Representante','agent']) || '';
    
    const t = parseFloat(getCol(row, ['tecnico','Técnico','TECNICO']) || 0) || 0;
    const ta = parseFloat(getCol(row, ['tactico','Táctico','TACTICO']) || 0) || 0;
    const f = parseFloat(getCol(row, ['fisico','Físico','FISICO']) || 0) || 0;
    const p = parseFloat(getCol(row, ['psicologico','Psicológico','PSICOLOGICO']) || 0) || 0;
    
    const notas = [];
    Object.keys(row).forEach(k => { if(/^f\d+$/i.test(k)) { const n = parseFloat(String(row[k]).replace(',','.')); notas.push(isNaN(n) ? null : n); } });
    
    const nok = notas.filter(n => n && n > 0);
    const prom = nok.length ? (nok.reduce((a,b)=>a+b)/nok.length).toFixed(2) : null;
    
    let ligaObj = getCol(row, ['liga_destino','Liga Destino','liga_objetiva','Liga Objetiva']) || '';
    if(!ligaObj) {
      const avg = (t+ta+f+p)/4;
      ligaObj = avg >= 7 ? 'Elite' : avg >= 6.5 ? 'Primera' : avg >= 5.5 ? 'Segunda' : 'Base';
    }
    
    const estado = (getCol(row, ['estado','Estado','STATUS','status']) || '').toUpperCase() || (prom ? (prom >= 7 ? 'RENDIDOR' : prom >= 6 ? 'ESTANCO' : 'BAJO') : 'BAJO');
    
    return { id:liga+'_'+i, nombre:nombre.toString().trim(), pos:pos.toString().trim(), club:club.toString().trim(), edad, alt, pie, nac, valor, contrato, rep, liga, estado, notas, prom, t, ta, f, p, ligaObj };
  }).filter(j => j.nombre.length > 1);
}

function init() {
  document.getElementById('banner').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderLigas();
  const ligas = Object.keys(DB.ligas);
  if(ligas.length) selectLiga(ligas[0]);
}

function renderLigas() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sec-title">Ligas</div>';
  Object.keys(DB.ligas).forEach(liga => {
    const div = document.createElement('div');
    div.className = 'liga-item';
    div.innerHTML = `<span class="liga-dot"></span>${liga}<span class="liga-count">${DB.ligas[liga].length}</span>`;
    div.onclick = () => selectLiga(liga);
    sb.appendChild(div);
  });
}

function selectLiga(liga) {
  DB.liga = liga;
  document.querySelectorAll('.liga-item').forEach(el => el.classList.remove('active'));
  event?.target?.classList.add('active');
  showPlayers();
}

function showPlayers() {
  const players = DB.ligas[DB.liga] || [];
  const search = (document.getElementById('search')?.value || '').toLowerCase();
  const list = document.getElementById('list');
  list.innerHTML = '';
  
  players.forEach(p => {
    if(DB.filter !== 'Todos' && p.estado !== DB.filter) return;
    if(search && !p.nombre.toLowerCase().includes(search) && !p.club.toLowerCase().includes(search)) return;
    
    const div = document.createElement('div');
    div.className = 'player-row' + (DB.player?.id === p.id ? ' selected' : '');
    const color = p.estado === 'RENDIDOR' ? '#00E676' : p.estado === 'ESTANCO' ? '#F5A623' : '#FF4444';
    div.innerHTML = `
      <div class="player-avatar">${p.nombre.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase()}</div>
      <div class="player-info">
        <div class="player-name">${p.nombre}</div>
        <div class="player-sub">${p.pos} · ${p.club}</div>
      </div>
      <div class="player-score" style="color:${color}">${p.prom || '—'}</div>
    `;
    div.onclick = () => selectPlayer(p);
    list.appendChild(div);
  });
}

function setFilter(f, btn) {
  DB.filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  showPlayers();
}

function selectPlayer(p) {
  DB.player = p;
  showPlayers();
  showProfile(p);
}

function getLogoUrl(club) {
  if(DB.equipos[club]) return DB.equipos[club];
  for(const eq in DB.equipos) if(eq.toLowerCase() === club.toLowerCase()) return DB.equipos[eq];
  return null;
}

function showProfile(p) {
  const logo = getLogoUrl(p.club);
  const logoHtml = logo ? `<img src="${logo}" alt="" onerror="this.style.display='none'">` : '';
  const nok = p.notas.filter(n => n && n > 0);
  const max = nok.length ? Math.max(...nok).toFixed(1) : '—';
  const min = nok.length ? Math.min(...nok).toFixed(1) : '—';
  
  const html = `
    <div class="card">
      <div class="hero">
        <div class="hero-avatar">${p.nombre.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase()}</div>
        <div class="hero-name">${p.nombre}</div>
        <div class="hero-pos">${p.pos}</div>
        <div class="hero-club">${logoHtml}<span>${p.club}</span></div>
      </div>
    </div>
    
    <div class="card">
      <div class="card-header">Datos</div>
      <div class="info-row"><span class="info-label">Edad</span><span class="info-value">${p.edad}</span></div>
      <div class="info-row"><span class="info-label">Altura</span><span class="info-value">${p.alt}</span></div>
      <div class="info-row"><span class="info-label">Pie</span><span class="info-value">${p.pie}</span></div>
      <div class="info-row"><span class="info-label">Nacionalidad</span><span class="info-value">${p.nac}</span></div>
      <div class="info-row"><span class="info-label">Valor</span><span class="info-value cyan">${p.valor}</span></div>
      <div class="info-row"><span class="info-label">Representante</span><span class="info-value">${p.rep}</span></div>
      <div class="info-row"><span class="info-label">Contrato</span><span class="info-value">${p.contrato}</span></div>
    </div>
    
    <div class="card">
      <div class="card-header">Rendimiento</div>
      <div class="info-row"><span class="info-label">Promedio</span><span class="info-value cyan">${p.prom || '—'}</span></div>
      <div class="info-row"><span class="info-label">Partidos</span><span class="info-value">${nok.length}</span></div>
      <div class="info-row"><span class="info-label">Mejor</span><span class="info-value">${max}</span></div>
      <div class="info-row"><span class="info-label">Peor</span><span class="info-value">${min}</span></div>
      <div class="info-row"><span class="info-label">Estado</span><span class="info-value">${p.estado}</span></div>
    </div>
    
    <div class="card">
      <div class="card-header">Aspectos</div>
      <div class="info-row"><span class="info-label">Técnico</span><span class="info-value cyan">${p.t}/5</span></div>
      <div class="info-row"><span class="info-label">Táctico</span><span class="info-value cyan">${p.ta}/5</span></div>
      <div class="info-row"><span class="info-label">Físico</span><span class="info-value cyan">${p.f}/5</span></div>
      <div class="info-row"><span class="info-label">Psicológico</span><span class="info-value cyan">${p.p}/5</span></div>
      <div class="info-row"><span class="info-label">Liga Objetiva</span><span class="info-value cyan">${p.ligaObj}</span></div>
    </div>
  `;
  
  document.getElementById('content').innerHTML = html;
}
</script>

</body>
</html>

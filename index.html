<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoutPro v3.3 — Fede Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg: #060F1C; --panel: #0A1628; --card: #0D1E35; --card2: #102340;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --cyan: #00D4FF; --cyan2: rgba(0,212,255,0.10);
  --gold: #F5A623; --green: #00E676; --red: #FF4444;
  --blue: #1B4FD8; --blue2: #3B6EF0; --blue3: rgba(59,110,240,0.14);
  --purple: #7C3AED;
  --w100: #FFF; --w70: rgba(255,255,255,0.70); --w50: rgba(255,255,255,0.50);
  --w30: rgba(255,255,255,0.30); --w15: rgba(255,255,255,0.15);
  --w08: rgba(255,255,255,0.08); --w04: rgba(255,255,255,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--w100); font-family: 'Inter', sans-serif; font-size: 13px; }

::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--panel); } ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; }

.topbar { height: 52px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-ico { width: 30px; height: 30px; background: var(--blue); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: white; }
.brand-name { font-size: 15px; font-weight: 800; }
.brand-name span { color: var(--cyan); }
.top-right { display: flex; align-items: center; gap: 8px; }
.tbtn { background: var(--w08); border: 1px solid var(--border); color: var(--w70); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; transition: all .15s; }
.tbtn:hover { background: var(--w15); color: var(--w100); }

.upload-banner { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 150; background: var(--bg); }
.upload-box { border: 2px dashed var(--border2); border-radius: 16px; padding: 60px 40px; text-align: center; max-width: 480px; cursor: pointer; transition: all .2s; }
.upload-box:hover, .upload-box.drag { border-color: var(--cyan); background: var(--cyan2); }
.upload-icon { font-size: 52px; margin-bottom: 16px; }
.upload-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.upload-sub { font-size: 13px; color: var(--w50); line-height: 1.7; margin-bottom: 20px; }
.upload-btn { background: var(--blue); color: white; border: none; padding: 11px 28px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s; }
.upload-btn:hover { background: var(--blue2); }

.shell { display: flex; height: 100vh; padding-top: 52px; }
.liga-sidebar { width: 200px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 12px 0; }
.liga-sec { padding: 12px 14px 5px; font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--w30); }
.liga-btn { display: flex; align-items: center; gap: 9px; padding: 9px 12px; cursor: pointer; font-size: 12px; font-weight: 500; color: var(--w70); transition: all .15s; border-left: 3px solid transparent; }
.liga-btn:hover { background: var(--w08); color: var(--w100); }
.liga-btn.active { background: var(--blue3); color: var(--cyan); border-left-color: var(--cyan); font-weight: 700; }
.liga-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--cyan); }
.liga-count { margin-left: auto; font-size: 10px; color: var(--w30); background: var(--w08); padding: 1px 6px; border-radius: 10px; }

.lista-panel { width: 270px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.lista-header { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); }
.lista-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.lista-search-wrap { position: relative; }
.lista-search-wrap input { width: 100%; background: var(--w08); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px 7px 28px; color: var(--w100); font-size: 11px; outline: none; }
.lista-search-wrap input::placeholder { color: var(--w30); }
.lista-search-wrap input:focus { border-color: var(--blue2); }
.lista-filtros { display: flex; gap: 5px; padding: 7px 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.fil-chip { padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); color: var(--w50); transition: all .15s; }
.fil-chip.active { background: var(--blue); border-color: var(--blue); color: white; }
.lista-body { flex: 1; overflow-y: auto; }
.prow { display: flex; align-items: center; gap: 9px; padding: 8px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: all .12s; }
.prow:hover { background: var(--w04); }
.prow.active { background: var(--blue3); border-left: 3px solid var(--cyan); }
.prow-ava { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; background: var(--blue); color: white; overflow: hidden; }
.prow-ava img { width: 100%; height: 100%; object-fit: cover; }
.prow-info { flex: 1; min-width: 0; }
.prow-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prow-sub { font-size: 10px; color: var(--w50); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prow-nota { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; min-width: 36px; text-align: right; padding: 3px 6px; border-radius: 4px; background: var(--w08); }

.main-area { flex: 1; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
.perfil-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.perfil-content { max-width: 1400px; }

.pcard { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.chead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.ch-title { font-size: 14px; font-weight: 700; }
.ch-badge { font-size: 10px; background: var(--w08); padding: 4px 8px; border-radius: 4px; color: var(--w50); }

.hero-top { text-align: center; margin-bottom: 12px; }
.foto-big { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 10px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: white; cursor: pointer; position: relative; overflow: hidden; }
.foto-big img { width: 100%; height: 100%; object-fit: cover; }
.p-nombre { font-size: 16px; font-weight: 800; margin: 8px 0 4px; }
.p-pos { font-size: 12px; color: var(--cyan); font-weight: 700; }
.p-club { font-size: 11px; color: var(--w50); margin: 4px 0 8px; display: flex; align-items: center; gap: 6px; }
.p-club img { width: 20px; height: 20px; border-radius: 3px; object-fit: cover; opacity: 0.7; }

.hero-body { padding: 8px 0; }
.irow { display: flex; justify-content: space-between; padding: 6px 0; font-size: 11px; }
.il { color: var(--w50); }
.iv { font-weight: 600; color: var(--w100); }
.iv.cy { color: var(--cyan); }

.toast { position: fixed; bottom: 20px; left: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 12px; z-index: 999; animation: slideIn .3s; }
.toast.green { border-color: var(--green); background: rgba(0,230,118,0.1); }
.toast.red { border-color: var(--red); background: rgba(255,68,68,0.1); }
@keyframes slideIn { from { transform: translateX(-300px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-ico">SP</div>
    <div class="brand-name">Scout<span>Pro</span></div>
  </div>
  <div class="top-right">
    <button class="tbtn" id="btnRecargar" onclick="document.getElementById('fileInput').click()" style="display:none">🔄 Actualizar Excel</button>
  </div>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls" onchange="cargarExcel(this)">

<div class="upload-banner" id="uploadBanner">
  <div class="upload-box" id="uploadBox" ondrop="onDrop(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📊</div>
    <div class="upload-title">Subí tu Excel de rendimientos</div>
    <div class="upload-sub">Cargá el archivo con tus anotaciones. ScoutPro analizará automáticamente</div>
    <button class="upload-btn">📂 Seleccionar archivo Excel</button>
  </div>
</div>

<div class="shell" id="appShell" style="display:none;">
  <div class="liga-sidebar">
    <div class="liga-sec">Categorías</div>
    <div class="liga-btn" onclick="document.getElementById('fileInput').click()" style="color:var(--cyan)">🔄 Actualizar Excel</div>
    <div style="height:1px;background:var(--border);margin:6px 10px;"></div>
    <div class="liga-sec">Divisiones</div>
    <div id="ligasContainer"></div>
  </div>

  <div class="lista-panel">
    <div class="lista-header">
      <div class="lista-title">👥 Jugadores</div>
      <div class="lista-search-wrap">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--w30)">🔎</span>
        <input type="text" id="listSearch" placeholder="Filtrar..." onkeyup="renderLista()">
      </div>
    </div>
    <div class="lista-filtros">
      <div class="fil-chip active" onclick="setFiltro('Todos',this)">Todos</div>
      <div class="fil-chip" onclick="setFiltro('RENDIDOR',this)">✅ Rendidor</div>
      <div class="fil-chip" onclick="setFiltro('ESTANCO',this)">📊 Estanco</div>
      <div class="fil-chip" onclick="setFiltro('BAJO',this)">⚠️ Bajo</div>
    </div>
    <div class="lista-body" id="listaBody"></div>
  </div>

  <div class="main-area">
    <div class="perfil-scroll">
      <div class="perfil-content" id="perfilContent"></div>
    </div>
  </div>
</div>

<script>
// ========== HELPER FUNCTIONS (DEFINIDAS PRIMERO) ==========

function buscarCol(row, keys) {
  for(const k of keys) {
    if(row[k] !== undefined && row[k] !== null && row[k] !== '') {
      return row[k];
    }
  }
  const rowKeys = Object.keys(row);
  for(const rk of rowKeys) {
    for(const k of keys) {
      if(rk.toLowerCase().trim() === k.toLowerCase().trim()) {
        return row[rk];
      }
    }
  }
  return null;
}

function iniciales(nombre) {
  return nombre.split(' ').map(p => p[0]).join('').substring(0,2).toUpperCase();
}

function showToast(msg, cls = '') {
  const toast = document.createElement('div');
  toast.className = 'toast ' + cls;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// ========== STATE & CONFIG ==========

const STATE = {
  ligas: {},
  equipos: {},
  currentLiga: null,
  currentPlayer: null,
  currentFiltro: 'Todos',
  fotos: {}
};

// ========== FILE HANDLING ==========

function onDrop(e) { e.preventDefault(); onDragLeave(e); if(e.dataTransfer.files[0]) cargarExcel({files:e.dataTransfer.files}); }
function onDragOver(e) { e.preventDefault(); document.getElementById('uploadBox').classList.add('drag'); }
function onDragLeave(e) { document.getElementById('uploadBox').classList.remove('drag'); }
function cargarExcel(input) { if(input.files[0]) procesarArchivo(input.files[0]); }

function procesarArchivo(file) {
  showToast('⏳ Leyendo ' + file.name + '...');
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});
      STATE.ligas = {};
      STATE.equipos = {};
      
      wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, {defval: null, raw: false});
        
        if(rows.length > 0) {
          // Si es pestaña Equipos, procesar diferente
          if(sheetName.toLowerCase().includes('equipo')) {
            console.log('Leyendo pestaña Equipos...');
            rows.forEach(row => {
              const nombreEquipo = buscarCol(row, ['equipo','Equipo','EQUIPO','nombre','Nombre','team','Team','club','Club']) || '';
              const logo = buscarCol(row, ['logo','Logo','LOGO','escudo','Escudo','ESCUDO','url','URL','logo_url']) || '';
              if(nombreEquipo) {
                STATE.equipos[nombreEquipo.toString().trim()] = logo.toString().trim();
              }
            });
          } else {
            // Procesar como liga de jugadores
            STATE.ligas[sheetName] = parsearHoja(rows, sheetName);
          }
        }
      });
      
      console.log('Equipos:', STATE.equipos);
      console.log('Ligas:', STATE.ligas);
      inicializarApp();
      showToast('✅ ' + file.name + ' cargado correctamente', 'green');
    } catch(err) {
      showToast('❌ Error: ' + err.message, 'red');
      console.error('ERROR PROCESANDO:', err);
    }
  };
  reader.readAsBinaryString(file);
}

function parsearHoja(rows, hoja) {
  console.log('Parseando hoja:', hoja, 'con', rows.length, 'filas');
  
  return rows.map((row, idx) => {
    // Leer notas por fecha
    const notas = [];
    const colsNotas = Object.keys(row).filter(k => {
      const kStr = String(k).toLowerCase().trim();
      return /^f\d+$/.test(kStr) || /^fecha\s*\d+/i.test(kStr);
    }).sort((a,b) => {
      const na = parseInt(String(a).replace(/\D/g,''));
      const nb = parseInt(String(b).replace(/\D/g,''));
      return na - nb;
    });

    colsNotas.forEach(k => {
      const v = row[k];
      if(v === null || v === undefined || v === '') {
        notas.push(null);
      } else {
        const n = parseFloat(String(v).replace(',','.'));
        notas.push(isNaN(n) ? null : n);
      }
    });

    const vals = notas.filter(n => n !== null && n > 0);
    const prom = vals.length ? parseFloat((vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2)) : null;

    // Leer datos básicos
    const nombre = buscarCol(row, ['nombre','Nombre','NOMBRE','jugador','Jugador','JUGADOR','player','Player']) || ('Jugador ' + (idx+1));
    const pos = buscarCol(row, ['posicion','Posición','posición','Posicion','pos','POS']) || '—';
    const club = buscarCol(row, ['club','Club','CLUB','equipo','Equipo','EQUIPO']) || '—';
    const edad = buscarCol(row, ['edad','Edad','EDAD','age']) || '—';
    const alt = buscarCol(row, ['altura','Altura','ALTURA','height']) || '—';
    const pie = buscarCol(row, ['pie','Pie','PIE','foot']) || '—';
    const nac = buscarCol(row, ['nacionalidad','Nacionalidad','pais','País']) || '—';
    const valor = buscarCol(row, ['valor','Valor','market value']) || '—';
    const contrato = buscarCol(row, ['contrato','Contrato','fin contrato','Fin Contrato']) || '—';
    const rep = buscarCol(row, ['representante','Representante','agente','Agente']) || '—';

    // Leer 4 aspectos
    const tecnico = parseFloat(buscarCol(row, ['tecnico','Técnico','TECNICO']) || '0') || 0;
    const tactico = parseFloat(buscarCol(row, ['tactico','Táctico','TACTICO']) || '0') || 0;
    const fisico = parseFloat(buscarCol(row, ['fisico','Físico','FISICO']) || '0') || 0;
    const psicologico = parseFloat(buscarCol(row, ['psicologico','Psicológico','PSICOLOGICO']) || '0') || 0;

    // Liga Objetiva
    let ligaObjetiva = buscarCol(row, ['liga_destino','Liga Destino','liga destino','liga_objetiva','Liga Objetiva']) || '';
    if(!ligaObjetiva || ligaObjetiva === '—') {
      const promAspectos = (tecnico + tactico + fisico + psicologico) / 4;
      if(promAspectos >= 7) ligaObjetiva = 'Elite';
      else if(promAspectos >= 6.5) ligaObjetiva = 'Primera';
      else if(promAspectos >= 5.5) ligaObjetiva = 'Segunda';
      else if(promAspectos > 0) ligaObjetiva = 'Base';
      else ligaObjetiva = '—';
    }

    // Estado
    const estadoRaw = buscarCol(row, ['estado','Estado','ESTADO','status']) || '';
    let estado = estadoRaw.toString().toUpperCase().trim();
    if(!estado || estado === 'NULL') {
      if(prom !== null) {
        estado = prom >= 7 ? 'RENDIDOR' : prom >= 6 ? 'ESTANCO' : 'BAJO';
      } else estado = '';
    }

    return {
      id: hoja + '_' + idx,
      nombre: nombre.toString().trim(),
      pos: pos.toString().trim(),
      club: club.toString().trim(),
      edad: edad.toString().trim(),
      alt: alt.toString().trim(),
      pie: pie.toString().trim(),
      nac: nac.toString().trim(),
      valor: valor.toString().trim(),
      contrato: contrato.toString().trim(),
      rep: rep.toString().trim(),
      div: hoja,
      estado,
      notas,
      prom,
      tecnico,
      tactico,
      fisico,
      psicologico,
      ligaObjetiva,
      foto: null
    };
  }).filter(j => j.nombre && j.nombre !== '—' && j.nombre.length > 1);
}

// ========== APP INIT ==========

function inicializarApp() {
  document.getElementById('uploadBanner').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  document.getElementById('btnRecargar').style.display = 'block';
  
  const ligasLista = Object.keys(STATE.ligas);
  if(ligasLista.length > 0) {
    setLiga(ligasLista[0]);
  }
  renderLigas();
}

function renderLigas() {
  const container = document.getElementById('ligasContainer');
  container.innerHTML = '';
  Object.keys(STATE.ligas).forEach(liga => {
    const count = STATE.ligas[liga].length;
    const div = document.createElement('div');
    div.className = 'liga-btn' + (STATE.currentLiga === liga ? ' active' : '');
    div.innerHTML = `<span class="liga-dot"></span>${liga}<span class="liga-count">${count}</span>`;
    div.onclick = () => setLiga(liga);
    container.appendChild(div);
  });
}

function setLiga(nombre) {
  STATE.currentLiga = nombre;
  document.querySelectorAll('.liga-btn').forEach(b => b.classList.remove('active'));
  event?.target?.classList.add('active');
  renderLista();
}

function renderLista() {
  const jugadores = STATE.ligas[STATE.currentLiga] || [];
  const searchText = (document.getElementById('listSearch')?.value || '').toLowerCase();
  const listaBody = document.getElementById('listaBody');
  listaBody.innerHTML = '';
  
  jugadores.forEach(j => {
    if(STATE.currentFiltro !== 'Todos' && j.estado !== STATE.currentFiltro) return;
    if(searchText && !j.nombre.toLowerCase().includes(searchText) && !j.club.toLowerCase().includes(searchText)) return;
    
    const row = document.createElement('div');
    row.className = 'prow' + (STATE.currentPlayer?.id === j.id ? ' active' : '');
    row.innerHTML = `
      <div class="prow-ava">${j.foto ? '<img src="'+j.foto+'" alt="">' : iniciales(j.nombre)}</div>
      <div class="prow-info">
        <div class="prow-name">${j.nombre}</div>
        <div class="prow-sub">${j.pos} · ${j.club}</div>
      </div>
      <div class="prow-nota" style="background:${j.estado==='RENDIDOR'?'rgba(0,230,118,0.15)':j.estado==='ESTANCO'?'rgba(245,166,35,0.15)':'rgba(255,68,68,0.15)'};color:${j.estado==='RENDIDOR'?'#00E676':j.estado==='ESTANCO'?'#F5A623':'#FF4444'}">${j.prom ? j.prom.toFixed(1) : '—'}</div>
    `;
    row.onclick = () => selectPlayer(j.id);
    listaBody.appendChild(row);
  });
}

function setFiltro(est, el) {
  STATE.currentFiltro = est;
  document.querySelectorAll('.fil-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderLista();
}

function selectPlayer(id) {
  const jugador = Object.values(STATE.ligas).flat().find(j => j.id === id);
  if(!jugador) {
    console.error('Jugador no encontrado:', id);
    return;
  }
  
  STATE.currentPlayer = jugador;
  console.log('Seleccionado:', jugador.nombre);
  
  document.querySelectorAll('.prow').forEach(r => r.classList.remove('active'));
  document.querySelector('[data-player-id="'+id+'"]')?.classList.add('active');
  
  const perfilHTML = buildPerfil(jugador);
  document.getElementById('perfilContent').innerHTML = perfilHTML;
}

function buildPerfil(j) {
  const logoUrl = getLogoUrl(j.club);
  const logoHTML = logoUrl ? `<img src="${logoUrl}" alt="${j.club}" onerror="this.style.display='none'">` : '';
  
  const notasValidas = j.notas.filter(n => n !== null && n !== undefined && n > 0);
  const max = notasValidas.length ? Math.max(...notasValidas).toFixed(1) : '—';
  const min = notasValidas.length ? Math.min(...notasValidas).toFixed(1) : '—';
  const partidos = notasValidas.length;

  return `
  <div class="pcard">
    <div class="hero-top">
      <div class="foto-big">${iniciales(j.nombre)}</div>
      <div class="p-nombre">${j.nombre}</div>
      <div class="p-pos">${j.pos}</div>
      <div class="p-club">${logoHTML}<span>${j.club} · ${j.div}</span></div>
    </div>
    <div class="hero-body">
      <div class="irow"><span class="il">Edad</span><span class="iv">${j.edad}</span></div>
      <div class="irow"><span class="il">Altura</span><span class="iv">${j.alt}</span></div>
      <div class="irow"><span class="il">Pie</span><span class="iv">${j.pie}</span></div>
      <div class="irow"><span class="il">Nacionalidad</span><span class="iv">${j.nac}</span></div>
      <div class="irow"><span class="il">Valor</span><span class="iv cy">${j.valor}</span></div>
      <div class="irow"><span class="il">Representante</span><span class="iv">${j.rep}</span></div>
      <div class="irow"><span class="il">Contrato</span><span class="iv">${j.contrato}</span></div>
      <div class="irow"><span class="il">Mejor nota</span><span class="iv">${max}</span></div>
      <div class="irow"><span class="il">Peor nota</span><span class="iv">${min}</span></div>
      <div class="irow"><span class="il">Partidos</span><span class="iv">${partidos}</span></div>
      <div class="irow"><span class="il">Promedio</span><span class="iv cy">${j.prom ? j.prom.toFixed(2) : '—'}</span></div>
      <div class="irow"><span class="il">Liga Objetiva</span><span class="iv cy"><strong>${j.ligaObjetiva}</strong></span></div>
      <div class="irow"><span class="il">Perfil</span><span class="iv"><strong>T:</strong> ${j.tecnico}/5 <strong>Ta:</strong> ${j.tactico}/5 <strong>F:</strong> ${j.fisico}/5 <strong>P:</strong> ${j.psicologico}/5</span></div>
    </div>
  </div>`;
}

function getLogoUrl(club) {
  // Buscar en pestaña Equipos
  if(STATE.equipos[club]) return STATE.equipos[club];
  
  // Buscar con nombre normalizado
  for(const nombreEquipo in STATE.equipos) {
    if(nombreEquipo.toLowerCase() === club.toLowerCase()) {
      return STATE.equipos[nombreEquipo];
    }
  }
  
  return null;
}

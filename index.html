<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoutPro v3.4 — Fede Scout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root {
  --bg: #060F1C; --panel: #0A1628; --card: #0D1E35; --card2: #102340;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --cyan: #00D4FF; --gold: #F5A623; --green: #00E676; --red: #FF4444;
  --blue: #1B4FD8; --blue2: #3B6EF0; --blue3: rgba(59,110,240,0.14);
  --w100: #FFF; --w70: rgba(255,255,255,0.70); --w50: rgba(255,255,255,0.50);
  --w30: rgba(255,255,255,0.30); --w15: rgba(255,255,255,0.15);
  --w08: rgba(255,255,255,0.08); --w04: rgba(255,255,255,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--w100); font-family: 'Inter', sans-serif; font-size: 13px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--panel); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 2px; }

.topbar { height: 52px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-ico { width: 30px; height: 30px; background: var(--blue); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: white; }
.brand-name { font-size: 15px; font-weight: 800; }
.brand-name span { color: var(--cyan); }

.upload-banner { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; z-index: 150; background: var(--bg); }
.upload-box { border: 2px dashed var(--border2); border-radius: 16px; padding: 60px 40px; text-align: center; max-width: 480px; cursor: pointer; }
.upload-box.drag { border-color: var(--cyan); background: rgba(0,212,255,0.10); }
.upload-icon { font-size: 52px; margin-bottom: 16px; }
.upload-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.upload-btn { background: var(--blue); color: white; border: none; padding: 11px 28px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }
.upload-btn:hover { background: var(--blue2); }

.shell { display: flex; height: 100vh; padding-top: 52px; }
.sidebar { width: 200px; flex-shrink: 0; background: var(--panel); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px 0; }
.sec-title { padding: 12px 14px 5px; font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--w30); }
.liga-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; cursor: pointer; font-size: 12px; color: var(--w70); border-left: 3px solid transparent; transition: all .15s; }
.liga-item:hover { background: var(--w08); }
.liga-item.active { background: var(--blue3); color: var(--cyan); border-left-color: var(--cyan); font-weight: 700; }
.liga-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; }
.liga-count { margin-left: auto; font-size: 10px; color: var(--w30); background: var(--w08); padding: 1px 6px; border-radius: 10px; }

.players-panel { width: 280px; flex-shrink: 0; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.players-header { padding: 12px 14px 8px; border-bottom: 1px solid var(--border); }
.players-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.search-box { position: relative; margin-bottom: 8px; }
.search-box input { width: 100%; background: var(--w08); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px 7px 28px; color: var(--w100); font-size: 11px; outline: none; }
.search-box input:focus { border-color: var(--blue2); }
.filters { display: flex; gap: 5px; padding: 7px 14px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-btn { padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); color: var(--w50); transition: all .15s; }
.filter-btn.active { background: var(--blue); border-color: var(--blue); color: white; }
.players-list { flex: 1; overflow-y: auto; }
.player-row { display: flex; align-items: center; gap: 9px; padding: 8px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: all .12s; }
.player-row:hover { background: var(--w04); }
.player-row.selected { background: var(--blue3); border-left: 3px solid var(--cyan); }
.player-avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; background: var(--blue); color: white; overflow: hidden; }
.player-avatar img { width: 100%; height: 100%; object-fit: cover; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-sub { font-size: 10px; color: var(--w50); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-score { font-family: monospace; font-size: 11px; font-weight: 700; min-width: 36px; text-align: right; padding: 3px 6px; border-radius: 4px; background: var(--w08); }

.main-area { flex: 1; background: var(--bg); display: flex; flex-direction: column; overflow: hidden; }
.main-scroll { flex: 1; overflow-y: auto; padding: 20px; }
.main-content { max-width: 1400px; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.card-title { font-size: 14px; font-weight: 700; }
.card-badge { font-size: 10px; background: var(--w08); padding: 4px 8px; border-radius: 4px; color: var(--w50); }

.hero { text-align: center; }
.hero-avatar { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 10px; background: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: white; cursor: pointer; overflow: hidden; }
.hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
.hero-name { font-size: 18px; font-weight: 800; margin: 8px 0 4px; }
.hero-pos { font-size: 13px; color: var(--cyan); font-weight: 700; margin-bottom: 4px; }
.hero-club { font-size: 12px; color: var(--w50); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; justify-content: center; }
.hero-club img { width: 22px; height: 22px; border-radius: 3px; object-fit: cover; opacity: 0.8; }

.info-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.info-row:last-child { border-bottom: none; }
.info-label { color: var(--w50); }
.info-value { font-weight: 600; color: var(--w100); }
.info-value.highlight { color: var(--cyan); }

.toast { position: fixed; bottom: 20px; left: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; font-size: 12px; z-index: 999; animation: slideIn .3s; }
.toast.success { border-color: var(--green); background: rgba(0,230,118,0.1); }
.toast.error { border-color: var(--red); background: rgba(255,68,68,0.1); }
@keyframes slideIn { from { transform: translateX(-300px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-ico">SP</div>
    <div class="brand-name">Scout<span>Pro</span></div>
  </div>
  <button class="brand-name" style="background:var(--blue);color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:12px;" id="btnRecargar" onclick="document.getElementById('fileInput').click()" style="display:none">🔄 Actualizar</button>
</div>

<input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this)">

<div class="upload-banner" id="uploadBanner">
  <div class="upload-box" id="uploadBox" ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">📊</div>
    <div class="upload-title">Subí tu Excel</div>
    <div style="font-size:13px;color:var(--w50);line-height:1.7;margin-bottom:20px;">Cargá el archivo con tus anotaciones</div>
    <button class="upload-btn">📂 Seleccionar archivo</button>
  </div>
</div>

<div class="shell" id="appShell" style="display:none;">
  <div class="sidebar" id="sidebar"></div>
  <div class="players-panel">
    <div class="players-header">
      <div class="players-title">👥 Jugadores</div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Filtrar..." onkeyup="renderPlayers()">
      </div>
    </div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('Todos', this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('RENDIDOR', this)">✅ Rendidor</button>
      <button class="filter-btn" onclick="setFilter('ESTANCO', this)">📊 Estanco</button>
      <button class="filter-btn" onclick="setFilter('BAJO', this)">⚠️ Bajo</button>
    </div>
    <div class="players-list" id="playersList"></div>
  </div>

  <div class="main-area">
    <div class="main-scroll">
      <div class="main-content" id="mainContent"></div>
    </div>
  </div>
</div>

<script>
// ========== ESTADO GLOBAL ==========
const APP = {
  ligas: {},
  equipos: {},
  currentLiga: null,
  currentPlayer: null,
  currentFilter: 'Todos'
};

// ========== UTILIDADES ==========
function log(msg) { console.log('[ScoutPro]', msg); }
function getInitials(name) { return name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase(); }
function showToast(msg, type = 'success') {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function findColumn(row, keys) {
  for(const k of keys) {
    if(row[k] !== undefined && row[k] !== null && row[k] !== '') return row[k];
  }
  const rowKeys = Object.keys(row);
  for(const rk of rowKeys) {
    for(const k of keys) {
      if(rk.toLowerCase().trim() === k.toLowerCase().trim()) return row[rk];
    }
  }
  return null;
}

// ========== FILE HANDLING ==========
function handleDrop(e) { e.preventDefault(); handleDragLeave(e); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); }
function handleDragOver(e) { e.preventDefault(); document.getElementById('uploadBox').classList.add('drag'); }
function handleDragLeave(e) { document.getElementById('uploadBox').classList.remove('drag'); }
function handleFile(input) { if(input.files[0]) processFile(input.files[0]); }

function processFile(file) {
  log('Leyendo archivo: ' + file.name);
  showToast('⏳ Leyendo ' + file.name + '...');
  
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'binary'});
      APP.ligas = {};
      APP.equipos = {};
      
      wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, {defval: null});
        
        log('Hoja: ' + sheetName + ' (' + rows.length + ' filas)');
        
        if(rows.length > 0) {
          if(sheetName.toLowerCase().includes('equipo')) {
            log('Detectada pestaña Equipos');
            rows.forEach(row => {
              const nombre = findColumn(row, ['equipo','Equipo','EQUIPO','nombre','Nombre','club','Club']) || '';
              const logo = findColumn(row, ['logo','Logo','LOGO','escudo','Escudo','url','URL']) || '';
              if(nombre) {
                APP.equipos[String(nombre).trim()] = String(logo).trim();
              }
            });
          } else {
            APP.ligas[sheetName] = parseSheet(rows, sheetName);
          }
        }
      });
      
      log('Equipos cargados: ' + Object.keys(APP.equipos).length);
      log('Ligas cargadas: ' + Object.keys(APP.ligas).length);
      
      initApp();
      showToast('✅ Archivo cargado correctamente', 'success');
    } catch(err) {
      log('ERROR: ' + err.message);
      showToast('❌ Error: ' + err.message, 'error');
    }
  };
  reader.readAsBinaryString(file);
}

function parseSheet(rows, liga) {
  log('Parseando ' + rows.length + ' jugadores de ' + liga);
  
  return rows.map((row, idx) => {
    const nombre = findColumn(row, ['nombre','Nombre','NOMBRE','jugador','Jugador','player']) || ('J' + idx);
    const pos = findColumn(row, ['posicion','Posición','pos','POS','position']) || '—';
    const club = findColumn(row, ['club','Club','CLUB','equipo','Equipo']) || '—';
    const edad = findColumn(row, ['edad','Edad','EDAD','age']) || '—';
    const alt = findColumn(row, ['altura','Altura','ALTURA','height']) || '—';
    const pie = findColumn(row, ['pie','Pie','PIE']) || '—';
    const nac = findColumn(row, ['nacionalidad','Nacionalidad','pais']) || '—';
    const valor = findColumn(row, ['valor','Valor','value']) || '—';
    const contrato = findColumn(row, ['contrato','Contrato']) || '—';
    const rep = findColumn(row, ['representante','Representante','agent']) || '—';
    
    const tecnico = parseFloat(findColumn(row, ['tecnico','Técnico','TECNICO']) || 0) || 0;
    const tactico = parseFloat(findColumn(row, ['tactico','Táctico','TACTICO']) || 0) || 0;
    const fisico = parseFloat(findColumn(row, ['fisico','Físico','FISICO']) || 0) || 0;
    const psicologico = parseFloat(findColumn(row, ['psicologico','Psicológico','PSICOLOGICO']) || 0) || 0;
    
    // Leer notas
    const notas = [];
    Object.keys(row).forEach(k => {
      const kLower = String(k).toLowerCase();
      if(/^f\d+$/.test(kLower)) {
        const n = parseFloat(String(row[k]).replace(',','.'));
        notas.push(isNaN(n) ? null : n);
      }
    });
    
    const notasValidas = notas.filter(n => n !== null && n > 0);
    const prom = notasValidas.length ? parseFloat((notasValidas.reduce((a,b)=>a+b,0) / notasValidas.length).toFixed(2)) : null;
    
    // Liga Objetiva
    let ligaObjetiva = findColumn(row, ['liga_destino','Liga Destino','liga_objetiva','Liga Objetiva']) || '';
    if(!ligaObjetiva || ligaObjetiva === '—') {
      const promAspectos = (tecnico + tactico + fisico + psicologico) / 4;
      if(promAspectos >= 7) ligaObjetiva = 'Elite';
      else if(promAspectos >= 6.5) ligaObjetiva = 'Primera';
      else if(promAspectos >= 5.5) ligaObjetiva = 'Segunda';
      else if(promAspectos > 0) ligaObjetiva = 'Base';
    }
    
    // Estado
    const estadoRaw = findColumn(row, ['estado','Estado','STATUS','status']) || '';
    let estado = estadoRaw ? String(estadoRaw).toUpperCase().trim() : '';
    if(!estado) {
      estado = prom ? (prom >= 7 ? 'RENDIDOR' : prom >= 6 ? 'ESTANCO' : 'BAJO') : 'BAJO';
    }
    
    return {
      id: liga + '_' + idx,
      nombre: String(nombre).trim(),
      pos: String(pos).trim(),
      club: String(club).trim(),
      edad: String(edad).trim(),
      alt: String(alt).trim(),
      pie: String(pie).trim(),
      nac: String(nac).trim(),
      valor: String(valor).trim(),
      contrato: String(contrato).trim(),
      rep: String(rep).trim(),
      liga: liga,
      estado: estado,
      notas: notas,
      prom: prom,
      tecnico, tactico, fisico, psicologico,
      ligaObjetiva: ligaObjetiva || '—'
    };
  }).filter(j => String(j.nombre).length > 1);
}

// ========== APP INIT ==========
function initApp() {
  document.getElementById('uploadBanner').style.display = 'none';
  document.getElementById('appShell').style.display = 'flex';
  
  renderSidebar();
  if(Object.keys(APP.ligas).length > 0) {
    selectLiga(Object.keys(APP.ligas)[0]);
  }
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '<div class="sec-title">Ligas</div>';
  
  Object.keys(APP.ligas).forEach(liga => {
    const count = APP.ligas[liga].length;
    const div = document.createElement('div');
    div.className = 'liga-item';
    div.innerHTML = `<span class="liga-dot"></span>${liga}<span class="liga-count">${count}</span>`;
    div.onclick = () => selectLiga(liga);
    sidebar.appendChild(div);
  });
}

function selectLiga(liga) {
  APP.currentLiga = liga;
  document.querySelectorAll('.liga-item').forEach(el => el.classList.remove('active'));
  event?.target?.classList.add('active');
  renderPlayers();
}

function renderPlayers() {
  const players = APP.ligas[APP.currentLiga] || [];
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const list = document.getElementById('playersList');
  list.innerHTML = '';
  
  players.forEach(p => {
    if(APP.currentFilter !== 'Todos' && p.estado !== APP.currentFilter) return;
    if(search && !p.nombre.toLowerCase().includes(search) && !p.club.toLowerCase().includes(search)) return;
    
    const div = document.createElement('div');
    div.className = 'player-row' + (APP.currentPlayer?.id === p.id ? ' selected' : '');
    div.innerHTML = `
      <div class="player-avatar">${getInitials(p.nombre)}</div>
      <div class="player-info">
        <div class="player-name">${p.nombre}</div>
        <div class="player-sub">${p.pos} · ${p.club}</div>
      </div>
      <div class="player-score" style="color:${p.estado==='RENDIDOR'?'#00E676':p.estado==='ESTANCO'?'#F5A623':'#FF4444'}">${p.prom ? p.prom.toFixed(1) : '—'}</div>
    `;
    div.onclick = () => selectPlayer(p);
    list.appendChild(div);
  });
}

function setFilter(filter, btn) {
  APP.currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderPlayers();
}

function selectPlayer(player) {
  log('Seleccionado: ' + player.nombre);
  APP.currentPlayer = player;
  renderPlayers();
  renderProfile(player);
}

function getLogoUrl(club) {
  if(APP.equipos[club]) return APP.equipos[club];
  for(const eq in APP.equipos) {
    if(eq.toLowerCase() === club.toLowerCase()) return APP.equipos[eq];
  }
  return null;
}

function renderProfile(player) {
  const logo = getLogoUrl(player.club);
  const logoHTML = logo ? `<img src="${logo}" alt="${player.club}" onerror="this.style.display='none'">` : '';
  
  const notasOK = player.notas.filter(n => n && n > 0);
  const max = notasOK.length ? Math.max(...notasOK).toFixed(1) : '—';
  const min = notasOK.length ? Math.min(...notasOK).toFixed(1) : '—';
  const partidos = notasOK.length;
  
  const html = `
  <div class="card">
    <div class="hero">
      <div class="hero-avatar">${getInitials(player.nombre)}</div>
      <div class="hero-name">${player.nombre}</div>
      <div class="hero-pos">${player.pos}</div>
      <div class="hero-club">${logoHTML}<span>${player.club}</span></div>
    </div>
  </div>
  
  <div class="card">
    <div class="card-header">
      <span class="card-title">📊 Datos</span>
    </div>
    <div class="info-row"><span class="info-label">Edad</span><span class="info-value">${player.edad}</span></div>
    <div class="info-row"><span class="info-label">Altura</span><span class="info-value">${player.alt}</span></div>
    <div class="info-row"><span class="info-label">Pie</span><span class="info-value">${player.pie}</span></div>
    <div class="info-row"><span class="info-label">Nacionalidad</span><span class="info-value">${player.nac}</span></div>
    <div class="info-row"><span class="info-label">Valor de mercado</span><span class="info-value highlight">${player.valor}</span></div>
    <div class="info-row"><span class="info-label">Representante</span><span class="info-value">${player.rep}</span></div>
    <div class="info-row"><span class="info-label">Contrato</span><span class="info-value">${player.contrato}</span></div>
  </div>
  
  <div class="card">
    <div class="card-header">
      <span class="card-title">📈 Rendimiento</span>
    </div>
    <div class="info-row"><span class="info-label">Promedio</span><span class="info-value highlight">${player.prom ? player.prom.toFixed(2) : '—'}</span></div>
    <div class="info-row"><span class="info-label">Partidos jugados</span><span class="info-value">${partidos}</span></div>
    <div class="info-row"><span class="info-label">Mejor nota</span><span class="info-value">${max}</span></div>
    <div class="info-row"><span class="info-label">Peor nota</span><span class="info-value">${min}</span></div>
    <div class="info-row"><span class="info-label">Estado</span><span class="info-value">${player.estado}</span></div>
  </div>
  
  <div class="card">
    <div class="card-header">
      <span class="card-title">⚙️ Aspectos</span>
    </div>
    <div class="info-row"><span class="info-label">Técnico</span><span class="info-value highlight">${player.tecnico}/5</span></div>
    <div class="info-row"><span class="info-label">Táctico</span><span class="info-value highlight">${player.tactico}/5</span></div>
    <div class="info-row"><span class="info-label">Físico</span><span class="info-value highlight">${player.fisico}/5</span></div>
    <div class="info-row"><span class="info-label">Psicológico</span><span class="info-value highlight">${player.psicologico}/5</span></div>
    <div class="info-row"><span class="info-label">Liga Objetiva</span><span class="info-value highlight">${player.ligaObjetiva}</span></div>
  </div>
  `;
  
  document.getElementById('mainContent').innerHTML = html;
}
</script>

</body>
</html>
